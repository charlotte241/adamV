name: Update dashboard data

on:
  schedule:
    - cron: '23 5,11,17,23 * * *'   # four times a day (UTC)
  workflow_dispatch:                 # manual "Run workflow" button

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch orders from Eventbrite
        env:
          EVENTBRITE_TOKEN: ${{ secrets.EVENTBRITE_TOKEN }}
        run: python3 scripts/fetch_data.py

      - name: Fetch weekly plan from monday.com
        env:
          MONDAY_TOKEN: ${{ secrets.MONDAY_TOKEN }}
        run: python3 scripts/fetch_plan.py

      - name: Commit if changed
        run: |
          git config user.name "rpm-dashboard-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data.json
          git add plan.json 2>/dev/null || true
          git diff --cached --quiet || (git commit -m "Data refresh $(date -u '+%Y-%m-%d %H:%M')" && git push)
